<script>
'use strict';

const MIN_ACTIVITY_DATE = '2024-05-01';

const pageMeta = {
  dashboard: ['Dashboard', 'Track self-reported and automatically entered ELMS CUs in one place.'],
  matcher: ['Find My Category', 'Start broad and see only the activities that apply.'],
  activity: ['Add or Track Activity', 'Enter only the information required for the selected category.'],
  records: ['My CU Records', 'Review estimated, approved, and automatic ELMS CUs.'],
  evidence: ['Evidence and ELMS', 'See exactly what belongs in the category folder.'],
  workspace: ['My Google Workspace', 'Your Sheet stores entries; your folders store evidence files.']
};

const unitLabels = {
  hours: 'Hours',
  semester_credit: 'Semester credits',
  quarter_credit: 'Quarter credits',
  iep_mdt: 'IEPs / MDTs written',
  student_case: 'Students / cases',
  fos_student: 'FOS students',
  week: 'Weeks',
  award: 'Awards',
  grant: 'Grants',
  microcredential: 'Micro-credentials',
  submission: 'Submission',
  certification: 'Certification',
  endorsement: 'Endorsements',
  documented_hours: 'Documented clock hours',
  ceu: 'CEUs listed on certificate'
};

const selfStatuses = [
  'Planning',
  'Needs evidence',
  'Ready for ELMS',
  'Submitted to ELMS',
  'Returned for corrections',
  'Approved in ELMS',
  'Denied'
];

const automaticStatuses = [
  'Waiting to appear in ELMS',
  'Confirmed in ELMS'
];

const state = {
  activities: [],
  rules: [],
  workspace: {},
  summary: {},
  warnings: [],
  specialRules: [],
  finder: {contexts: []},
  currentStep: 1
};

const elements = {};

document.addEventListener('DOMContentLoaded', function() {
  [
    'loading','loadingText','toast','mobileNav','heading','sub',
    'workspaceStatus','workspaceDetails','workbookLink','rootFolderLink',
    'estimatedSelf','approvedSelf','automaticElms','confirmedTotal','remaining',
    'warningBox','dashboardFindButton','dashboardSelfButton','dashboardAutoButton',
    'matcherContext','matcherContextHelp','matcherRole','matcherRoleHelp',
    'matcherActivity','matcherActivityList','matcherDate','specialAlertArea','matchResults',
    'activityForm','activityId','recordType','formHeading','formSubheading',
    'switchRecordTypeButton','wizardProgress','activityStep1','activityStep2','activityStep3',
    'categoryKey','categoryGuidance','sessionSection','sessionInputBasis','sessionRows',
    'addSessionButton','sessionTotal','sessionWarning','quantityField','quantityLabel',
    'quantity','quantityHelp','unitField','unit','paymentStatusField','paymentStatus',
    'titleIField','titleIException','clearActivityButton','nextToDetailsButton',
    'title','description','startDateField','startDateLabel','startDate',
    'endDateField','endDateLabel','endDate','organization','role','status',
    'officialApprovedField','officialApprovedCUs','backToCalculationButton',
    'nextToEvidenceButton','saveAutomaticButton','evidenceRequirementBox',
    'createFolderLine','createFolder','evidenceLink','notes','backToDetailsButton',
    'saveButton','result','resultCategory','resultCUs','resultStatus',
    'resultFolderLink','resultWorkbookLink','recordsAddButton','recordsBody','categoryBody',
    'evidenceActivitySelect','evidenceGuideOutput','openWorkbookButton','createFoldersButton'
  ].forEach(function(id) {
    elements[id] = document.getElementById(id);
  });

  bindEvents();
  addSessionRow();
  loadBootstrap();
});

function bindEvents() {
  document.querySelectorAll('nav button').forEach(function(button) {
    button.addEventListener('click', function() {
      showView(button.dataset.view);
    });
  });

  elements.mobileNav.addEventListener('change', function(event) {
    showView(event.target.value);
  });

  elements.dashboardFindButton.addEventListener('click', function() {
    showView('matcher');
  });

  elements.dashboardSelfButton.addEventListener('click', function() {
    startNewActivity('self_report');
  });

  elements.dashboardAutoButton.addEventListener('click', function() {
    startNewActivity('automatic_elms');
  });

  elements.recordsAddButton.addEventListener('click', function() {
    startNewActivity('self_report');
  });

  elements.matcherContext.addEventListener('change', populateFinderRoles);
  elements.matcherRole.addEventListener('change', renderFinderActivities);
  elements.matcherActivityList.addEventListener('change', selectFinderActivity);

  elements.categoryKey.addEventListener('change', function() {
    configureCategory(elements.categoryKey.value);
  });

  elements.switchRecordTypeButton.addEventListener('click', function() {
    const nextType = elements.recordType.value === 'automatic_elms'
      ? 'self_report'
      : 'automatic_elms';
    startNewActivity(nextType);
  });

  elements.addSessionButton.addEventListener('click', function() {
    addSessionRow();
  });

  elements.sessionRows.addEventListener('input', updateSessionTotals);
  elements.sessionRows.addEventListener('change', updateSessionTotals);

  elements.sessionRows.addEventListener('click', function(event) {
    const button = event.target.closest('button[data-remove-session]');
    if (!button) return;
    button.closest('tr').remove();
    if (!elements.sessionRows.children.length) addSessionRow();
    updateSessionTotals();
  });

  elements.clearActivityButton.addEventListener('click', function() {
    startNewActivity(elements.recordType.value);
  });

  elements.nextToDetailsButton.addEventListener('click', goToDetails);
  elements.backToCalculationButton.addEventListener('click', function() {
    showActivityStep(1);
  });
  elements.nextToEvidenceButton.addEventListener('click', goToEvidence);
  elements.backToDetailsButton.addEventListener('click', function() {
    showActivityStep(2);
  });
  elements.saveAutomaticButton.addEventListener('click', saveActivity);
  elements.activityForm.addEventListener('submit', saveActivity);

  elements.status.addEventListener('change', updateOfficialField);

  elements.recordsBody.addEventListener('click', function(event) {
    const button = event.target.closest('button[data-action]');
    if (!button) return;

    if (button.dataset.action === 'edit') editActivity(button.dataset.id);
    if (button.dataset.action === 'delete') removeActivity(button.dataset.id);
    if (button.dataset.action === 'folder') createCategoryFolder(button.dataset.id);
  });

  elements.evidenceActivitySelect.addEventListener('change', renderEvidenceGuide);

  elements.openWorkbookButton.addEventListener('click', function() {
    if (state.workspace.spreadsheetUrl) {
      window.open(state.workspace.spreadsheetUrl, '_blank', 'noopener');
    }
  });

  elements.createFoldersButton.addEventListener('click', createWorkspaceFolders);
}

function runServer(method, payload) {
  return new Promise(function(resolve, reject) {
    const runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(error) {
        reject(new Error(error && error.message ? error.message : String(error)));
      });

    if (method === 'getBootstrapData') runner.getBootstrapData();
    else if (method === 'saveActivity') runner.saveActivity(payload);
    else if (method === 'deleteActivity') runner.deleteActivity(payload);
    else if (method === 'createWorkspaceFolders') runner.createWorkspaceFolders();
    else if (method === 'createEvidenceFolderForActivity') {
      runner.createEvidenceFolderForActivity(payload);
    } else {
      reject(new Error('Unknown server method.'));
    }
  });
}

async function loadBootstrap() {
  setLoading(true, 'Loading your PGS tracker...');
  try {
    applyBootstrap(await runServer('getBootstrapData'));
  } catch (error) {
    showToast(error.message, true);
  } finally {
    setLoading(false);
  }
}

function applyBootstrap(data) {
  state.activities = data.activities || [];
  state.rules = (data.rules || []).filter(function(rule) {
    return rule.active;
  });
  state.workspace = data.workspace || {};
  state.summary = data.summary || {};
  state.warnings = data.warnings || [];
  state.specialRules = data.specialRules || [];
  state.finder = data.finderData || {contexts: []};

  populateCategories();
  initializeGuidedFinder();
  renderWorkspace();
  renderDashboard();
  renderRecords();
  populateEvidenceActivities();
  renderEvidenceGuide();

  elements.resultWorkbookLink.href = state.workspace.spreadsheetUrl || '#';
}

function renderWorkspace() {
  const hasWorkbook = Boolean(state.workspace.spreadsheetUrl);
  const hasFolder = Boolean(state.workspace.rootFolderUrl);

  elements.workspaceStatus.textContent = hasWorkbook
    ? 'Connected to your teacher-owned Google Sheet.'
    : 'Your tracker Sheet has not been created yet.';

  elements.workspaceDetails.textContent =
    'Entries are saved in the Sheet. Evidence files remain under your control in Google Drive.';

  setLink(elements.workbookLink, state.workspace.spreadsheetUrl, 'Open My Tracker Sheet');
  setLink(elements.rootFolderLink, state.workspace.rootFolderUrl, 'Open My PGS Folder');

  elements.openWorkbookButton.disabled = !hasWorkbook;
}

function renderDashboard() {
  elements.estimatedSelf.textContent = numberText(state.summary.estimatedSelfReported);
  elements.approvedSelf.textContent = numberText(state.summary.approvedSelfReported);
  elements.automaticElms.textContent = numberText(state.summary.automaticElmsTotal);
  elements.confirmedTotal.textContent = numberText(state.summary.confirmedTotal);
  elements.remaining.textContent = numberText(state.summary.remaining);

  elements.warningBox.innerHTML = state.warnings.slice(0, 3).map(function(message) {
    return '<div>- ' + escapeHtml(message) + '</div>';
  }).join('');
}

function populateCategories() {
  const selected = elements.categoryKey.value;
  const groups = groupBy(state.rules, 'parentCategory');
  let html = '<option value="">Choose the official category</option>';

  Object.keys(groups).sort(function(a, b) {
    return a.localeCompare(b);
  }).forEach(function(parent) {
    const sortedRules = groups[parent].slice().sort(function(a, b) {
      return a.activityName.localeCompare(b.activityName);
    });

    html += '<optgroup label="' + escapeHtml(parent) + '">';

    sortedRules.forEach(function(rule) {
      html += '<option value="' + escapeHtml(rule.categoryKey) + '">' +
        escapeHtml(rule.activityName) + '</option>';
    });

    html += '</optgroup>';
  });

  elements.categoryKey.innerHTML = html;

  if (state.rules.some(function(rule) {
    return rule.categoryKey === selected;
  })) {
    elements.categoryKey.value = selected;
  }
}

function initializeGuidedFinder() {
  const contexts = (state.finder.contexts || []).slice().sort(function(a, b) {
    return a.label.localeCompare(b.label);
  });

  elements.matcherContext.innerHTML =
    '<option value="">Choose one</option>' +
    contexts.map(function(context) {
      return '<option value="' + escapeHtml(context.id) + '">' +
        escapeHtml(context.label) + '</option>';
    }).join('');

  elements.matcherRole.innerHTML =
    '<option value="">Choose the first answer</option>';
  elements.matcherRole.disabled = true;
  elements.matcherActivity.value = '';
  elements.matcherActivityList.innerHTML =
    '<div class="empty-choice">Choose the first two answers to see the available activities.</div>';
  elements.matchResults.innerHTML = '';
  elements.specialAlertArea.innerHTML = '';
}

function getFinderContext() {
  return (state.finder.contexts || []).find(function(context) {
    return context.id === elements.matcherContext.value;
  });
}

function getFinderRole() {
  const context = getFinderContext();
  if (!context) return null;

  return (context.roles || []).find(function(role) {
    return role.id === elements.matcherRole.value;
  });
}

function getFinderActivity() {
  const role = getFinderRole();
  if (!role) return null;

  return (role.activities || []).find(function(activity) {
    return activity.id === elements.matcherActivity.value;
  });
}

function populateFinderRoles() {
  const context = getFinderContext();

  elements.matcherActivity.value = '';
  elements.matchResults.innerHTML = '';
  elements.specialAlertArea.innerHTML = '';

  if (!context) {
    elements.matcherRole.disabled = true;
    elements.matcherRole.innerHTML =
      '<option value="">Choose the first answer</option>';
    elements.matcherActivityList.innerHTML =
      '<div class="empty-choice">Choose the first two answers to see the available activities.</div>';
    elements.matcherContextHelp.textContent =
      'The list is alphabetized and grouped to reduce choices.';
    return;
  }

  elements.matcherContextHelp.textContent = context.description;
  elements.matcherRole.disabled = false;
  elements.matcherRole.innerHTML =
    '<option value="">Choose what you did</option>' +
    (context.roles || []).map(function(role) {
      return '<option value="' + escapeHtml(role.id) + '">' +
        escapeHtml(role.label) + '</option>';
    }).join('');

  if ((context.roles || []).length === 1) {
    elements.matcherRole.value = context.roles[0].id;
    renderFinderActivities();
  } else {
    elements.matcherActivityList.innerHTML =
      '<div class="empty-choice">Choose what you did to see the matching activities.</div>';
  }
}

function renderFinderActivities() {
  const role = getFinderRole();
  elements.matcherActivity.value = '';
  elements.matchResults.innerHTML = '';
  elements.specialAlertArea.innerHTML = '';

  if (!role) {
    elements.matcherActivityList.innerHTML =
      '<div class="empty-choice">Choose what you did to see the matching activities.</div>';
    return;
  }

  elements.matcherRoleHelp.textContent = role.description;

  const activities = (role.activities || []).slice().sort(function(a, b) {
    return a.label.localeCompare(b.label);
  });

  elements.matcherActivityList.innerHTML = activities.map(function(activity) {
    return '<label class="finder-activity-card">' +
      '<input type="radio" name="finderActivityChoice" value="' +
      escapeHtml(activity.id) + '">' +
      '<span><strong>' + escapeHtml(activity.label) + '</strong>' +
      '<p>' + escapeHtml(activity.description) + '</p></span>' +
      '</label>';
  }).join('');

  if (activities.length === 1) {
    const radio = elements.matcherActivityList.querySelector(
      'input[name="finderActivityChoice"]'
    );
    if (radio) {
      radio.checked = true;
      selectFinderActivity({target: radio});
    }
  }
}

function selectFinderActivity(event) {
  const radio = event.target.closest('input[name="finderActivityChoice"]');
  if (!radio) return;

  elements.matcherActivity.value = radio.value;

  elements.matcherActivityList
    .querySelectorAll('.finder-activity-card')
    .forEach(function(card) {
      const input = card.querySelector('input[name="finderActivityChoice"]');
      card.classList.toggle('selected', Boolean(input && input.checked));
    });

  renderFinderResult();
}

function renderFinderResult() {
  const selected = getFinderActivity();
  const context = getFinderContext();
  const role = getFinderRole();

  if (!selected || !context || !role) return;

  const date = elements.matcherDate.value;
  if (date && date < MIN_ACTIVITY_DATE) {
    elements.matchResults.innerHTML =
      '<div class="notice danger">This assistant applies only to activities on or after May 1, 2024.</div>';
    return;
  }

  renderSpecialAlerts(selected.specialRuleId || '');

  if (selected.workflowOnly) {
    elements.matchResults.innerHTML =
      '<div class="match-card best">' +
      '<div class="parent-label">Special department workflow</div>' +
      '<h3>' + escapeHtml(selected.label) + '</h3>' +
      '<p>' + escapeHtml(selected.officialBasis) + '</p>' +
      '<details><summary>Official source</summary><p>' +
      escapeHtml((selected.sourceDocument || 'CCSD and CCEA PGS Announcements') +
        (selected.sourcePage ? ', page ' + selected.sourcePage : '')) +
      '</p></details></div>';
    return;
  }

  const rule = getRule(selected.categoryKey);
  if (!rule) return;

  elements.matchResults.innerHTML =
    '<div class="match-card best simplified-match">' +
    '<div class="parent-label">Recommended official category</div>' +
    '<h3>' + escapeHtml(rule.activityName) + '</h3>' +
    '<div class="simple-guidance">' +
      '<div><strong>Enter</strong><span>' +
        escapeHtml(entryInstruction(rule)) + '</span></div>' +
      '<div><strong>Upload</strong><span>' +
        escapeHtml(rule.documentation) + '</span></div>' +
      importantGuidanceHtml(rule) +
    '</div>' +
    '<details><summary>Why this recommendation is supported</summary>' +
      '<p>' + escapeHtml(selected.description) + '</p>' +
      '<p><strong>Source:</strong> ' +
      escapeHtml(rule.sourceDocument + ', page ' + rule.sourcePage) + '</p>' +
    '</details>' +
    '<button class="btn blue" type="button" data-use-category="' +
      escapeHtml(rule.categoryKey) + '">Continue with This Category</button>' +
    '</div>';

  const button = elements.matchResults.querySelector('button[data-use-category]');
  if (button) {
    button.addEventListener('click', function() {
      useCategory(button.dataset.useCategory);
    });
  }
}

function renderSpecialAlerts(selectedRuleId) {
  const date = elements.matcherDate.value;

  const matches = state.specialRules.filter(function(rule) {
    const selected = selectedRuleId && rule.id === selectedRuleId;
    const dateMatch = !date || !rule.effectiveDate || date >= rule.effectiveDate;
    return selected && dateMatch;
  });

  elements.specialAlertArea.innerHTML = matches.map(function(rule) {
    return '<div class="notice danger"><strong>' +
      escapeHtml(rule.title) + '</strong><br>' +
      escapeHtml(rule.message) + '</div>';
  }).join('');
}

function useCategory(categoryKey) {
  startNewActivity('self_report');
  elements.categoryKey.value = categoryKey;

  const selected = getFinderActivity();
  const context = getFinderContext();
  const role = getFinderRole();

  if (selected) {
    elements.description.placeholder =
      'Briefly explain what you did. Example: ' + (selected.description || '');
  }

  if (context) elements.organization.value = context.label || '';
  if (role) elements.role.value = role.label || '';
  if (elements.matcherDate.value) {
    elements.startDate.value = elements.matcherDate.value;
    elements.endDate.value = elements.matcherDate.value;
  }

  configureCategory(categoryKey);

  const rule = getRule(categoryKey);
  if (rule && rule.entryMode === 'session_time' && elements.matcherDate.value) {
    const dateInput = elements.sessionRows.querySelector('.session-date');
    if (dateInput) dateInput.value = elements.matcherDate.value;
    updateSessionTotals();
  }
}

function startNewActivity(recordType) {
  resetActivityForm();
  elements.recordType.value = recordType || 'self_report';
  configureRecordType();
  showActivityStep(1);
  showView('activity');
}

function configureRecordType() {
  const automatic = elements.recordType.value === 'automatic_elms';

  elements.formHeading.textContent = automatic
    ? 'Track CUs Already Entered in ELMS'
    : 'Add a Self-Reported Activity';

  elements.formSubheading.textContent = automatic
    ? 'Choose the category shown in Advancement Status, then enter the CU amount from ELMS.'
    : 'First enter only the information used to calculate this category.';

  elements.switchRecordTypeButton.textContent = automatic
    ? 'Add a Self-Reported Activity'
    : 'Track CUs already in ELMS';

  elements.nextToEvidenceButton.hidden = automatic;
  elements.saveAutomaticButton.hidden = !automatic;
  elements.createFolderLine.hidden = automatic;

  populateStatusOptions();
  configureCategory(elements.categoryKey.value);
  updateWizardIndicators();
}

function populateStatusOptions() {
  const options = elements.recordType.value === 'automatic_elms'
    ? automaticStatuses
    : selfStatuses;

  const current = elements.status.value;

  elements.status.innerHTML = options.map(function(status) {
    return '<option value="' + escapeHtml(status) + '">' +
      escapeHtml(status) + '</option>';
  }).join('');

  if (options.indexOf(current) >= 0) {
    elements.status.value = current;
  } else {
    elements.status.value = options[0];
  }

  updateOfficialField();
}

function configureCategory(categoryKey) {
  const rule = getRule(categoryKey);
  const automaticRecord = elements.recordType.value === 'automatic_elms';

  hideCalculationFields();

  if (!rule) {
    elements.categoryGuidance.hidden = true;
    return;
  }

  if (rule.entryMode === 'automatic' && !automaticRecord) {
    elements.recordType.value = 'automatic_elms';
    configureRecordType();
    return;
  }

  elements.categoryGuidance.hidden = false;
  elements.categoryGuidance.innerHTML =
    '<div class="simple-guidance">' +
      '<div><strong>Enter</strong><span>' +
        escapeHtml(automaticRecord
          ? 'Enter the CUs exactly as they appear in ELMS on the next screen.'
          : entryInstruction(rule)) +
      '</span></div>' +
      (automaticRecord ? '' :
        '<div><strong>Upload</strong><span>' +
          escapeHtml(rule.documentation) + '</span></div>') +
      (automaticRecord ? '' : importantGuidanceHtml(rule)) +
    '</div>';

  if (automaticRecord) return;

  const mode = rule.entryMode || '';
  const units = rule.units && rule.units.length ? rule.units : [];

  if (mode === 'session_time') {
    elements.sessionSection.hidden = false;
    elements.sessionInputBasis.textContent =
      'Enter each qualifying session. The assistant calculates net hours after breaks.';
    if (!elements.sessionRows.children.length) addSessionRow();
    updateSessionTotals();
  }

  if (['duration_hours','count','credit','credit_review','ceu_or_hours'].indexOf(mode) >= 0) {
    elements.quantityField.hidden = false;
    elements.quantityLabel.textContent = rule.quantityLabel || 'Quantity';
    elements.quantityHelp.textContent = conciseQuantityHelp(rule);
    elements.quantity.step = String(rule.quantityStep || 1);

    elements.unitField.hidden = false;
    elements.unit.innerHTML = units.map(function(unit) {
      return '<option value="' + escapeHtml(unit) + '">' +
        escapeHtml(unitLabels[unit] || unit) + '</option>';
    }).join('');
  }

  if (mode === 'duration_hours') {
    elements.paymentStatusField.hidden = false;
    elements.unit.innerHTML = '<option value="hours">Documented clock hours</option>';
  }

  if (rule.titleIExceptionAllowed) {
    elements.titleIField.hidden = false;
  }

  if (mode === 'fixed') {
    elements.categoryGuidance.innerHTML +=
      '<div class="notice info"><strong>Official fixed value:</strong> ' +
      escapeHtml(calculationSummary(rule)) + '</div>';
  }

  updateDetailDateLabels(rule);
}

function hideCalculationFields() {
  elements.sessionSection.hidden = true;
  elements.quantityField.hidden = true;
  elements.unitField.hidden = true;
  elements.paymentStatusField.hidden = true;
  elements.titleIField.hidden = true;
}

function entryInstruction(rule) {
  const mode = rule.entryMode || '';

  if (mode === 'session_time') {
    return 'Each qualifying date, start time, end time, break, and payment status.';
  }

  if (mode === 'automatic') {
    return 'No self-reported quantity. Track the CUs after they appear in ELMS.';
  }

  if (mode === 'fixed') {
    return 'Confirm that the official milestone was completed. The CU value is fixed.';
  }

  return rule.quantityHelp || rule.evidenceInputBasis ||
    ('Enter the ' + (rule.quantityLabel || 'quantity') + '.');
}

function conciseQuantityHelp(rule) {
  if (rule.categoryKey === 'WRITE_IEP_MDT') {
    return 'Enter only the number of qualifying IEPs/MDTs written.';
  }

  if (rule.categoryKey === 'IEP_MDT_TEAM') {
    return 'Enter only the number of qualifying students/cases.';
  }

  if (rule.categoryKey === 'GRANT_RECIPIENT') {
    return 'Enter only grants actually awarded. Do not enter grant-writing hours.';
  }

  return rule.quantityHelp || '';
}

function importantGuidanceHtml(rule) {
  let message = '';

  if (rule.categoryKey === 'WRITE_IEP_MDT' ||
      rule.categoryKey === 'IEP_MDT_TEAM') {
    message =
      'Redact all parent/student information, including signatures, before uploading the signature pages.';
  } else if (rule.categoryKey === 'GRANT_RECIPIENT') {
    message =
      'The current category is based on grants received, not hours spent writing or applying.';
  } else if (rule.categoryKey === 'DISTRICT_PD') {
    message =
      'Do not create a duplicate self-reported ELMS submission.';
  } else if (rule.limitations) {
    message = rule.limitations;
  }

  return message
    ? '<div><strong>Important</strong><span>' + escapeHtml(message) + '</span></div>'
    : '';
}

function updateDetailDateLabels(rule) {
  if (!rule) return;

  elements.startDateLabel.textContent = rule.dateLabel || 'Start date';
  elements.endDateLabel.textContent = rule.endDateLabel || 'End date';

  const sessionMode = rule.entryMode === 'session_time';
  elements.startDateField.hidden = sessionMode;
  elements.endDateField.hidden = sessionMode || !rule.showEndDate;

  if (sessionMode) {
    const sessions = collectSessions().filter(function(session) {
      return session.date;
    });

    const dates = sessions.map(function(session) {
      return session.date;
    }).sort();

    if (dates.length) {
      elements.startDate.value = dates[0];
      elements.endDate.value = dates[dates.length - 1];
    }
  }
}

function showActivityStep(step) {
  state.currentStep = step;

  [1,2,3].forEach(function(number) {
    const panel = elements['activityStep' + number];
    if (panel) panel.classList.toggle('active', number === step);
  });

  updateWizardIndicators();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function updateWizardIndicators() {
  const automatic = elements.recordType.value === 'automatic_elms';

  elements.wizardProgress
    .querySelectorAll('[data-step-indicator]')
    .forEach(function(indicator) {
      const step = Number(indicator.dataset.stepIndicator);
      indicator.classList.toggle('active', step === state.currentStep);
      indicator.hidden = automatic && step === 3;
    });
}

function validateCalculationStep() {
  const rule = getRule(elements.categoryKey.value);

  if (!rule) {
    showToast('Choose an activity category.', true);
    return false;
  }

  if (elements.recordType.value === 'automatic_elms') return true;

  const mode = rule.entryMode || '';

  if (mode === 'session_time') {
    const sessions = collectSessions().filter(function(session) {
      return session.date || session.startTime || session.endTime;
    });

    if (!sessions.length) {
      showToast('Add at least one qualifying session.', true);
      return false;
    }

    const invalid = sessions.find(function(session) {
      return !session.date || !session.startTime || !session.endTime ||
        calculateSessionMinutes(session).error;
    });

    if (invalid) {
      showToast(
        calculateSessionMinutes(invalid).error ||
        'Every session needs a date, start time, and end time.',
        true
      );
      return false;
    }

    updateSessionTotals();
  }

  if (['duration_hours','count','credit','credit_review','ceu_or_hours'].indexOf(mode) >= 0 &&
      !(Number(elements.quantity.value) > 0)) {
    showToast((rule.quantityLabel || 'Quantity') + ' must be greater than zero.', true);
    elements.quantity.focus();
    return false;
  }

  return true;
}

function goToDetails() {
  if (!validateCalculationStep()) return;

  const rule = getRule(elements.categoryKey.value);
  updateDetailDateLabels(rule);

  if (!elements.title.value) {
    elements.title.value = shortActivityTitle(rule);
  }

  elements.description.placeholder = elements.description.placeholder ||
    'Briefly explain what you did for this activity.';

  showActivityStep(2);
}

function shortActivityTitle(rule) {
  if (!rule) return '';

  const shortNames = {
    WRITE_IEP_MDT: 'IEPs/MDTs Written',
    IEP_MDT_TEAM: 'IEP/MDT Team Participation',
    GRANT_RECIPIENT: 'Grant Awards',
    PLC: 'PLC Participation',
    MICRO_CREDENTIAL: 'Digital Promise Micro-Credentials'
  };

  return shortNames[rule.categoryKey] || rule.activityName;
}

function validateDetailsStep() {
  if (!elements.title.value.trim()) {
    showToast('Enter an activity name.', true);
    elements.title.focus();
    return false;
  }

  if (!elements.description.value.trim()) {
    showToast('Enter a short activity description.', true);
    elements.description.focus();
    return false;
  }

  const rule = getRule(elements.categoryKey.value);
  const sessionMode = rule && rule.entryMode === 'session_time';

  if (!sessionMode && !elements.startDate.value) {
    showToast('Enter the activity date or beginning of the activity period.', true);
    elements.startDate.focus();
    return false;
  }

  if (elements.startDate.value &&
      elements.startDate.value < MIN_ACTIVITY_DATE) {
    showToast('This assistant applies only to activities on or after May 1, 2024.', true);
    return false;
  }

  if (elements.endDate.value &&
      elements.endDate.value < elements.startDate.value) {
    showToast('The end date cannot be earlier than the start date.', true);
    return false;
  }

  if (elements.recordType.value === 'automatic_elms' &&
      elements.status.value === 'Confirmed in ELMS' &&
      !(Number(elements.officialApprovedCUs.value) > 0)) {
    showToast('Enter the CUs shown in ELMS.', true);
    elements.officialApprovedCUs.focus();
    return false;
  }

  return true;
}

function goToEvidence() {
  if (!validateDetailsStep()) return;

  const rule = getRule(elements.categoryKey.value);
  renderEvidenceRequirement(rule);
  showActivityStep(3);
}

function renderEvidenceRequirement(rule) {
  if (!rule) {
    elements.evidenceRequirementBox.innerHTML = '';
    return;
  }

  elements.evidenceRequirementBox.innerHTML =
    '<h3>Evidence for ' + escapeHtml(rule.activityName) + '</h3>' +
    '<div class="simple-guidance">' +
      '<div><strong>Upload these items</strong><span>' +
        escapeHtml(rule.documentation) + '</span></div>' +
      importantGuidanceHtml(rule) +
      '<div><strong>Final ELMS file</strong><span>' +
        'Combine the required evidence into one final file. Paste that file link below; do not paste the folder link.' +
      '</span></div>' +
    '</div>';
}

function updateOfficialField() {
  const automatic = elements.recordType.value === 'automatic_elms';
  const officialStatus =
    elements.status.value === 'Approved in ELMS' ||
    elements.status.value === 'Confirmed in ELMS';

  elements.officialApprovedField.hidden = !(automatic || officialStatus);
}

function addSessionRow(session) {
  const data = session || {};
  const row = document.createElement('tr');

  row.innerHTML =
    '<td><input class="session-date" type="date" min="' + MIN_ACTIVITY_DATE +
      '" value="' + escapeHtml(data.date || '') + '" aria-label="Session date"></td>' +
    '<td><input class="session-start" type="time" value="' +
      escapeHtml(data.startTime || '') + '" aria-label="Start time"></td>' +
    '<td><input class="session-end" type="time" value="' +
      escapeHtml(data.endTime || '') + '" aria-label="End time"></td>' +
    '<td><input class="session-break" type="number" min="0" step="1" value="' +
      escapeHtml(data.breakMinutes === undefined ? '0' : data.breakMinutes) +
      '" aria-label="Break minutes"></td>' +
    '<td><select class="session-payment" aria-label="Payment status">' +
      paymentOptionsHtml(data.paymentStatus || 'unpaid') + '</select></td>' +
    '<td><span class="session-hours">0.00</span></td>' +
    '<td><button class="icon-button" type="button" data-remove-session ' +
      'aria-label="Remove session">x</button></td>';

  elements.sessionRows.appendChild(row);
  updateSessionTotals();
}

function paymentOptionsHtml(selected) {
  const options = [
    ['unpaid', 'Unpaid'],
    ['paid', 'Paid stipend / supplemental'],
    ['contract', 'Regular contractual rate']
  ];

  return options.map(function(option) {
    return '<option value="' + option[0] + '"' +
      (option[0] === selected ? ' selected' : '') + '>' +
      escapeHtml(option[1]) + '</option>';
  }).join('');
}

function collectSessions() {
  return Array.from(elements.sessionRows.querySelectorAll('tr')).map(function(row) {
    return {
      date: row.querySelector('.session-date').value,
      startTime: row.querySelector('.session-start').value,
      endTime: row.querySelector('.session-end').value,
      breakMinutes: Number(row.querySelector('.session-break').value || 0),
      paymentStatus: row.querySelector('.session-payment').value
    };
  });
}

function calculateSessionMinutes(session) {
  if (!session.date || !session.startTime || !session.endTime) {
    return {minutes: 0, error: ''};
  }

  const start = timeStringToMinutes(session.startTime);
  const end = timeStringToMinutes(session.endTime);

  if (end <= start) {
    return {minutes: 0, error: 'Each end time must be later than its start time.'};
  }

  const gross = end - start;
  const breakMinutes = Math.max(0, Math.floor(Number(session.breakMinutes || 0)));

  if (breakMinutes >= gross) {
    return {minutes: 0, error: 'A break cannot equal or exceed the session length.'};
  }

  return {minutes: gross - breakMinutes, error: ''};
}

function timeStringToMinutes(value) {
  const parts = String(value || '').split(':');
  return parts.length === 2
    ? Number(parts[0]) * 60 + Number(parts[1])
    : 0;
}

function updateSessionTotals() {
  let totalMinutes = 0;
  let firstError = '';

  Array.from(elements.sessionRows.querySelectorAll('tr')).forEach(function(row) {
    const session = {
      date: row.querySelector('.session-date').value,
      startTime: row.querySelector('.session-start').value,
      endTime: row.querySelector('.session-end').value,
      breakMinutes: row.querySelector('.session-break').value,
      paymentStatus: row.querySelector('.session-payment').value
    };

    const result = calculateSessionMinutes(session);
    totalMinutes += result.minutes;
    if (!firstError && result.error) firstError = result.error;

    row.querySelector('.session-hours').textContent =
      (result.minutes / 60).toFixed(2);
  });

  elements.sessionTotal.textContent =
    (totalMinutes / 60).toFixed(2) + ' hours';

  elements.quantity.value = totalMinutes / 60;
  elements.unit.value = 'hours';

  const sessions = collectSessions().filter(function(session) {
    return session.date;
  });

  const dates = sessions.map(function(session) {
    return session.date;
  }).sort();

  if (dates.length) {
    elements.startDate.value = dates[0];
    elements.endDate.value = dates[dates.length - 1];
  }

  const statuses = sessions.map(function(session) {
    return session.paymentStatus;
  }).filter(function(value, index, array) {
    return array.indexOf(value) === index;
  });

  elements.paymentStatus.value =
    statuses.length === 1
      ? statuses[0]
      : (statuses.length > 1 ? 'mixed' : 'unpaid');

  elements.sessionWarning.hidden = !firstError;
  elements.sessionWarning.textContent = firstError;
}

async function saveActivity(event) {
  if (event) event.preventDefault();

  if (!validateCalculationStep() || !validateDetailsStep()) return;

  const rule = getRule(elements.categoryKey.value);

  const payload = {
    id: elements.activityId.value,
    recordType: elements.recordType.value,
    title: elements.title.value.trim(),
    description: elements.description.value.trim(),
    startDate: elements.startDate.value,
    endDate: elements.endDate.value,
    organization: elements.organization.value.trim(),
    role: elements.role.value.trim(),
    categoryKey: elements.categoryKey.value,
    paymentStatus: elements.paymentStatus.value,
    quantity: Number(elements.quantity.value || 0),
    unit: elements.unit.value,
    titleIException: elements.titleIException.value,
    sessions: rule && rule.entryMode === 'session_time' &&
      elements.recordType.value === 'self_report'
        ? collectSessions()
        : [],
    status: elements.status.value,
    officialApprovedCUs: elements.officialApprovedCUs.value,
    evidenceLink: elements.evidenceLink.value.trim(),
    notes: elements.notes.value.trim(),
    createFolder: elements.recordType.value === 'self_report' &&
      elements.createFolder.checked
  };

  setLoading(true, 'Saving to your Google Sheet...');

  try {
    const data = await runServer('saveActivity', payload);
    applyBootstrap(data);

    const saved = state.activities.find(function(item) {
      return item.id === data.savedId;
    });

    if (saved) showSavedResult(saved);

    showToast('Saved in your teacher-owned Google Sheet.');
    showView('activity');
  } catch (error) {
    showToast(error.message, true);
  } finally {
    setLoading(false);
  }
}

function showSavedResult(activity) {
  elements.resultCategory.textContent = activity.categoryName;
  elements.resultCUs.textContent =
    activity.recordType === 'automatic_elms'
      ? numberText(activity.officialApprovedCUs)
      : estimateText(activity.estimatedCUs);
  elements.resultStatus.textContent = activity.status;

  setLink(
    elements.resultFolderLink,
    activity.activityFolderUrl,
    'Open Category Folder'
  );

  elements.result.classList.add('show');
  elements.result.scrollIntoView({behavior: 'smooth', block: 'start'});
}

function editActivity(id) {
  const activity = state.activities.find(function(item) {
    return item.id === id;
  });

  if (!activity) return;

  resetActivityForm();

  elements.activityId.value = activity.id;
  elements.recordType.value = activity.recordType || 'self_report';
  configureRecordType();

  elements.categoryKey.value = activity.categoryKey;
  configureCategory(activity.categoryKey);

  elements.title.value = activity.title || '';
  elements.description.value = activity.description || '';
  elements.startDate.value = activity.startDate || '';
  elements.endDate.value = activity.endDate || '';
  elements.organization.value = activity.organization || '';
  elements.role.value = activity.role || '';
  elements.status.value = activity.status || '';
  elements.officialApprovedCUs.value =
    activity.officialApprovedCUs === '' ? '' : activity.officialApprovedCUs;
  elements.evidenceLink.value = activity.evidenceLink || '';
  elements.notes.value = activity.notes || '';

  const rule = getRule(activity.categoryKey);

  if (rule && rule.entryMode === 'session_time') {
    elements.sessionRows.innerHTML = '';
    (activity.sessions || []).forEach(function(session) {
      addSessionRow(session);
    });
    if (!elements.sessionRows.children.length) addSessionRow();
    updateSessionTotals();
  } else {
    elements.quantity.value = activity.quantity || 0;
    elements.unit.value = activity.unit || elements.unit.value;
    elements.paymentStatus.value = activity.paymentStatus || 'unpaid';
    elements.titleIException.value = activity.titleIException || 'no';
  }

  populateStatusOptions();
  if ((elements.status.querySelector(
      'option[value="' + cssEscape(activity.status || '') + '"]'
    ))) {
    elements.status.value = activity.status;
  }
  updateOfficialField();

  elements.formHeading.textContent =
    activity.recordType === 'automatic_elms'
      ? 'Edit ELMS Tracking Record'
      : 'Edit Self-Reported Activity';

  showActivityStep(1);
  showView('activity');
}

async function removeActivity(id) {
  const activity = state.activities.find(function(item) {
    return item.id === id;
  });

  if (!activity || !confirm('Delete "' + activity.title + '"? Drive folders will remain.')) {
    return;
  }

  setLoading(true, 'Deleting the tracker record...');

  try {
    applyBootstrap(await runServer('deleteActivity', id));
    showToast('Tracker record deleted.');
  } catch (error) {
    showToast(error.message, true);
  } finally {
    setLoading(false);
  }
}

async function createCategoryFolder(id) {
  setLoading(true, 'Creating or opening the category folder...');

  try {
    applyBootstrap(await runServer('createEvidenceFolderForActivity', id));
    const activity = state.activities.find(function(item) {
      return item.id === id;
    });

    if (activity && activity.activityFolderUrl) {
      window.open(activity.activityFolderUrl, '_blank', 'noopener');
    }

    showToast('Category folder is ready.');
  } catch (error) {
    showToast(error.message, true);
  } finally {
    setLoading(false);
  }
}

async function createWorkspaceFolders() {
  setLoading(true, 'Creating or verifying your PGS folders...');

  try {
    applyBootstrap(await runServer('createWorkspaceFolders'));
    showToast('Your PGS folder structure is ready.');
  } catch (error) {
    showToast(error.message, true);
  } finally {
    setLoading(false);
  }
}

function renderRecords() {
  if (!state.activities.length) {
    elements.recordsBody.innerHTML =
      '<tr><td colspan="8">No records yet.</td></tr>';
  } else {
    elements.recordsBody.innerHTML = state.activities.map(function(activity) {
      const automatic = activity.recordType === 'automatic_elms';
      const evidenceUrl = safeHttpUrl(activity.evidenceLink);
      const folderUrl = safeHttpUrl(activity.activityFolderUrl);

      let evidence = automatic
        ? 'Not required for tracker'
        : (evidenceUrl
          ? '<a href="' + escapeHtml(evidenceUrl) +
            '" target="_blank" rel="noopener">Final file</a>'
          : 'Final file not linked');

      if (folderUrl && !automatic) {
        evidence += '<br><a href="' + escapeHtml(folderUrl) +
          '" target="_blank" rel="noopener">Category folder</a>';
      }

      const folderButton = !automatic && !folderUrl
        ? '<button class="btn small green" type="button" data-action="folder" data-id="' +
          escapeHtml(activity.id) + '">Create Folder</button>'
        : '';

      return '<tr>' +
        '<td><strong>' + escapeHtml(activity.title) + '</strong><br><small>' +
          escapeHtml(truncate(activity.description, 75)) + '</small></td>' +
        '<td>' + (automatic ? 'Automatic ELMS' : 'Self-reported') + '</td>' +
        '<td>' + escapeHtml(activity.categoryName) + '</td>' +
        '<td>' + estimateText(activity.estimatedCUs) + '</td>' +
        '<td>' + (activity.officialApprovedCUs === ''
          ? '-'
          : numberText(activity.officialApprovedCUs)) + '</td>' +
        '<td><span class="tag">' + escapeHtml(activity.status) + '</span></td>' +
        '<td>' + evidence + '</td>' +
        '<td><div class="table-actions">' +
          '<button class="btn small ghost" type="button" data-action="edit" data-id="' +
            escapeHtml(activity.id) + '">Edit</button>' +
          folderButton +
          '<button class="btn small danger-button" type="button" data-action="delete" data-id="' +
            escapeHtml(activity.id) + '">Delete</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');
  }

  const balances = (state.summary.categoryBalances || []).filter(function(item) {
    return item.estimated > 0 ||
      item.approvedSelfReported > 0 ||
      item.automaticElms > 0;
  });

  elements.categoryBody.innerHTML = balances.length
    ? balances.map(function(item) {
      return '<tr>' +
        '<td><strong>' + escapeHtml(item.category) + '</strong><br><small>' +
          escapeHtml(item.parentCategory) + '</small></td>' +
        '<td>' + numberText(item.estimated) + '</td>' +
        '<td>' + numberText(item.approvedSelfReported) + '</td>' +
        '<td>' + numberText(item.automaticElms) + '</td>' +
        '<td>' + numberText(item.confirmedTotal) + '</td>' +
        '<td>' + (item.maximum === null ? 'No stated max' : numberText(item.maximum)) + '</td>' +
        '<td>' + (item.remaining === null ? '-' : numberText(item.remaining)) + '</td>' +
      '</tr>';
    }).join('')
    : '<tr><td colspan="7">Category totals will appear after records are saved.</td></tr>';
}

function populateEvidenceActivities() {
  const selected = elements.evidenceActivitySelect.value;

  const selfReported = state.activities.filter(function(activity) {
    return activity.recordType !== 'automatic_elms';
  });

  elements.evidenceActivitySelect.innerHTML =
    '<option value="">Choose an activity</option>' +
    selfReported.map(function(activity) {
      return '<option value="' + escapeHtml(activity.id) + '">' +
        escapeHtml(activity.title + ' - ' + activity.categoryName) +
      '</option>';
    }).join('');

  if (selfReported.some(function(activity) {
    return activity.id === selected;
  })) {
    elements.evidenceActivitySelect.value = selected;
  }
}

function renderEvidenceGuide() {
  const id = elements.evidenceActivitySelect.value;

  if (!id) {
    elements.evidenceGuideOutput.innerHTML =
      '<div class="notice info">Choose a self-reported activity to see its evidence requirements.</div>';
    return;
  }

  const activity = state.activities.find(function(item) {
    return item.id === id;
  });

  const rule = activity ? getRule(activity.categoryKey) : null;

  if (!activity || !rule) {
    elements.evidenceGuideOutput.innerHTML =
      '<div class="notice danger">The saved category rule could not be found.</div>';
    return;
  }

  const folderButton = activity.activityFolderUrl
    ? '<a class="btn green" href="' + escapeHtml(activity.activityFolderUrl) +
      '" target="_blank" rel="noopener">Open Category Folder</a>'
    : '<button class="btn green" type="button" data-create-guide-folder="' +
      escapeHtml(activity.id) + '">Create Category Folder</button>';

  elements.evidenceGuideOutput.innerHTML =
    '<div class="card evidence-card">' +
      '<div class="parent-label">' + escapeHtml(rule.parentCategory) + '</div>' +
      '<h3>' + escapeHtml(activity.title) + '</h3>' +
      '<div class="simple-guidance">' +
        '<div><strong>Upload these items</strong><span>' +
          escapeHtml(rule.documentation) + '</span></div>' +
        importantGuidanceHtml(rule) +
        '<div><strong>Final file</strong><span>' +
          'Combine the required evidence into one final file. Share the final file so CCSD users with the link can view it.' +
        '</span></div>' +
      '</div>' +
      '<div class="actions">' + folderButton +
        (activity.evidenceLink
          ? '<a class="btn ghost" href="' + escapeHtml(activity.evidenceLink) +
            '" target="_blank" rel="noopener">Open Final Evidence File</a>'
          : '') +
      '</div>' +
      '<details><summary>Official source</summary><p>' +
        escapeHtml(rule.sourceDocument + ', page ' + rule.sourcePage) +
      '</p></details>' +
    '</div>';

  const createButton = elements.evidenceGuideOutput.querySelector(
    '[data-create-guide-folder]'
  );

  if (createButton) {
    createButton.addEventListener('click', function() {
      createCategoryFolder(createButton.dataset.createGuideFolder);
    });
  }
}

function resetActivityForm() {
  elements.activityForm.reset();
  elements.activityId.value = '';
  elements.recordType.value = 'self_report';
  elements.categoryKey.value = '';
  elements.categoryGuidance.hidden = true;
  elements.sessionRows.innerHTML = '';
  addSessionRow();
  elements.quantity.value = '0';
  elements.evidenceLink.value = '';
  elements.notes.value = '';
  elements.result.classList.remove('show');
  hideCalculationFields();
  populateStatusOptions();
  showActivityStep(1);
}

function showView(viewId) {
  if (!pageMeta[viewId]) return;

  document.querySelectorAll('.view').forEach(function(view) {
    view.classList.remove('active');
  });

  document.getElementById(viewId).classList.add('active');

  document.querySelectorAll('nav button').forEach(function(button) {
    button.classList.toggle('active', button.dataset.view === viewId);
  });

  elements.mobileNav.value = viewId;
  elements.heading.textContent = pageMeta[viewId][0];
  elements.sub.textContent = pageMeta[viewId][1];

  window.scrollTo({top: 0, behavior: 'smooth'});
}

function getRule(key) {
  return state.rules.find(function(rule) {
    return rule.categoryKey === key;
  });
}

function groupBy(items, key) {
  return items.reduce(function(groups, item) {
    const value = item[key] || 'Other';
    (groups[value] = groups[value] || []).push(item);
    return groups;
  }, {});
}

function calculationSummary(rule) {
  if (rule.calculationType === 'hours') {
    return 'Normally 1 CU per ' + rule.unpaidHoursPerCU +
      ' unpaid hours or ' + rule.paidHoursPerCU + ' paid hours';
  }

  if (rule.calculationType === 'count') {
    return rule.perUnitCUs + ' CUs per qualifying item';
  }

  if (rule.calculationType === 'fixed') {
    return rule.fixedCUs + ' fixed CUs';
  }

  if (rule.calculationType === 'unit_rate') {
    return Object.keys(rule.unitRates || {}).map(function(unit) {
      return rule.unitRates[unit] + ' CUs per ' +
        (unitLabels[unit] || unit).toLowerCase();
    }).join(' or ');
  }

  return 'Requires category-specific review';
}

function estimateText(value) {
  return value === '' || value === null || value === undefined
    ? '-'
    : numberText(value);
}

function setLoading(show, message) {
  elements.loading.classList.toggle('hidden', !show);
  if (message) elements.loadingText.textContent = message;
}

function showToast(message, isError) {
  elements.toast.textContent = message;
  elements.toast.style.borderLeft =
    '5px solid ' + (isError ? '#c94747' : '#4d9b45');
  elements.toast.classList.add('show');

  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(function() {
    elements.toast.classList.remove('show');
  }, 5000);
}

function setLink(element, url, label) {
  const safe = safeHttpUrl(url);
  element.hidden = !safe;

  if (safe) {
    element.href = safe;
    element.textContent = label;
  }
}

function safeHttpUrl(value) {
  if (!value) return '';

  try {
    const parsed = new URL(value);
    return ['http:', 'https:'].indexOf(parsed.protocol) >= 0
      ? parsed.href
      : '';
  } catch (error) {
    return '';
  }
}

function escapeHtml(value) {
  return String(value === null || value === undefined ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function truncate(value, length) {
  const text = String(value || '');
  return text.length > length
    ? text.slice(0, length - 1) + '...'
    : text;
}

function numberText(value) {
  const number = Number(value);
  return Number.isFinite(number) ? number.toFixed(2) : '0.00';
}

function cssEscape(value) {
  return String(value || '').replace(/["\\]/g, '\\$&');
}
