<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="1; url=https://script.google.com/macros/s/AKfycbz55RZG8wA5_1kHKOR1OVAEkAplVyhpGuIvTC6igz8/exec">
  <title>Opening FamilyPD PGS Assistant</title>
  <style>
    :root {
      --navy: #17365d;
      --blue: #2f75b5;
      --gold: #f2b33d;
      --bg: #f4f7fb;
      --muted: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 85% 15%, rgba(47,117,181,.16), transparent 28rem),
        var(--bg);
      color: #1f2937;
    }
    .card {
      width: min(640px, 100%);
      padding: 34px;
      border: 1px solid #d9e1ea;
      border-radius: 22px;
      background: white;
      box-shadow: 0 18px 45px rgba(23,54,93,.14);
      text-align: center;
    }
    .mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: var(--navy);
      color: white;
      font-weight: 900;
      font-size: 24px;
    }
    h1 {
      margin: 0 0 10px;
      color: var(--navy);
      font-size: clamp(28px, 6vw, 42px);
      line-height: 1.05;
    }
    p {
      margin: 0 auto 22px;
      max-width: 510px;
      color: var(--muted);
      line-height: 1.6;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 12px;
      background: var(--gold);
      color: #0b2139;
      text-decoration: none;
      font-weight: 900;
    }
    .spinner {
      width: 38px;
      height: 38px;
      margin: 18px auto 0;
      border: 4px solid #dce8f2;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    small {
      display: block;
      margin-top: 20px;
      color: var(--muted);
    }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', function () {
      window.setTimeout(function () {
        window.location.replace('https://script.google.com/macros/s/AKfycbz55RZG8wA5_1kHKOR1OVAEkAplVyhpGuIvTC6igz8/exec');
      }, 250);
    });
  </script>
</head>
<body>
  <main class="card">
    <div class="mark">CU</div>
    <h1>Opening your PGS Assistant</h1>
    <p>
      You are being securely redirected to the private FamilyPD PGS dashboard.
      Google may ask you to sign in with an authorized account.
    </p>
    <a class="button" href="https://script.google.com/macros/s/AKfycbz55RZG8wA5_1kHKOR1OVAEkAplVyhpGuIvTC6igz8/exec">Open the PGS Dashboard</a>
    <div class="spinner" aria-hidden="true"></div>
    <small>
      This assistant applies only to activities occurring on or after May 1, 2024.
    </small>
  </main>
</body>
</html>
